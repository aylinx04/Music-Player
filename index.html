<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player">
        <img id="cd" class="cd" src="PlayerIcons/CD1.png">
        <div class="info">
            <div id="title" class="title"></div>
            <div id="artist" class="artist"></div>
        </div>
        <img id="nextbtn" class="nextbtn" src="PlayerIcons/NextButton.png">
        <img id="prevbtn" class="previousbtn" src="PlayerIcons/PreviousButton.png">
        <img id="pauseBtn" class="pausebtn" src="PlayerIcons/PauseButton.png">
        <img id="playBtn" class="playbtn" src="PlayerIcons/PlayButton.png">
        <img class="player-bg" src="PlayerIcons/Player.png">
        <audio id="audio"></audio>
    </div>
    
    <script src="functions.js"></script>
</body>
</html>
